<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>3D indoor map prototype — 3 floors</title>
<style>
  :root { --bg1:#08111f; --bg2:#17233f; --panel:rgba(9,16,30,.78); --text:#eaf4ff; }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; font-family:Inter,Segoe UI,Arial,sans-serif; color:var(--text); background:transparent; }
  .hud { position:fixed; z-index:10; left:18px; top:18px; width:min(390px,calc(100vw - 36px)); padding:16px; border:1px solid rgba(255,255,255,.14); border-radius:20px; background:var(--panel); backdrop-filter:blur(12px); box-shadow:0 20px 60px rgba(0,0,0,.35); }
  .hud h1 { margin:0 0 8px; font-size:19px; }
  .hud p { margin:0 0 12px; font-size:13px; line-height:1.4; color:#b9c7da; }
  .row { display:grid; grid-template-columns:82px 1fr 44px; gap:8px; align-items:center; margin:8px 0; font-size:13px; }
  input[type=range] { width:100%; accent-color:#75d7ff; }
  button { border:0; color:#08111f; background:#75d7ff; padding:9px 12px; border-radius:12px; font-weight:700; cursor:pointer; }
  .floor-buttons { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:12px 0; }
  .floor-button { background:#1c2a40; color:#cfe6ff; border:1px solid rgba(255,255,255,.12); }
  .floor-button.active { background:#75d7ff; color:#08111f; }
  .stage { position:fixed; inset:0; perspective:1400px; display:flex; align-items:center; justify-content:center; }
  .scene { position:relative; width:90%; max-width:1500px; height:0; padding-bottom:63.7%; transform-style:preserve-3d; will-change:transform; transform:translateZ(0); }
  .scene:active { cursor:grabbing; }
  svg.floor-model { position:absolute; inset:0; width:100%; height:100%; overflow:visible; display:none; }
  svg.floor-model.active { display:block; }
  .ground { opacity:.78; }
  .side { fill:#223048 !important; stroke:#111827 !important; stroke-width:3 !important; }
  .top * { vector-effect:non-scaling-stroke; }
  .top [fill="none"] { fill:none !important; }
  .glass { fill:rgba(120,210,255,.25); stroke:#89e3ff; stroke-width:4; }
  .label { font-size:95px; font-weight:800; fill:#f8fbff; paint-order:stroke; stroke:#101928; stroke-width:14; opacity:.88; }
  .beacon { animation:pulse 1.6s ease-in-out infinite; transform-origin:center; }
  @keyframes pulse { 0%,100%{opacity:.9} 50%{opacity:.35} }
  .hint { position:fixed; right:18px; bottom:18px; z-index:10; padding:12px 14px; border-radius:16px; background:rgba(9,16,30,.72); color:#cbd7e6; font-size:13px; border:1px solid rgba(255,255,255,.12); }
  .hud, .hint { display:none !important; }
</style>
</head>
<body>
<div class="hud">
  <h1>Цветная объёмная indoor-карта</h1>
  <p>Второй и третий этажи исправлены: линии больше не превращаются в чёрную заливку.</p>

  <div class="floor-buttons">
    <button class="floor-button active" data-floor="0">Этаж 1</button>
    <button class="floor-button" data-floor="1">Этаж 2</button>
    <button class="floor-button" data-floor="2">Этаж 3</button>
  </div>

  <div class="row"><span>Наклон</span><input id="rx" type="range" min="35" max="75" value="58"><b id="rxv">58°</b></div>
  <div class="row"><span>Поворот</span><input id="rz" type="range" min="-65" max="65" value="-28"><b id="rzv">-28°</b></div>
  <div class="row"><span>Масштаб</span><input id="sc" type="range" min="35" max="120" value="72"><b id="scv">72%</b></div>
  <button id="reset">Сбросить вид</button>
</div>

<script>
const scene=document.getElementById('scene');
let currentFloor=0;

// Фиксированные наклон/поворот; масштаб даём менять только pinch-zoom'ом WebView.
scene.style.transform = 'rotateX(35deg) rotateZ(0deg) scale(0.95)';
scene.style.transformOrigin = '50% 50%';

function switchFloor(nextFloor) {
  nextFloor = Number(nextFloor);
  if (nextFloor === currentFloor) return;
  const oldFloor = document.getElementById('floor' + currentFloor);
  const newFloor = document.getElementById('floor' + nextFloor);
  if (!newFloor) return;
  if (oldFloor) oldFloor.classList.remove('active');
  newFloor.classList.add('active');
  currentFloor = nextFloor;
}

// Вызывается из Android через evaluateJavascript.
window.setFloor = switchFloor;
</script>
